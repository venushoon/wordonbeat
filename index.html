<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>단어 리듬 게임 (지형편)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Jua', sans-serif;
            background-color: #f1f5f9;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 칼같은 0.375초 비트 타격감 */
        @keyframes beatSnap {
            0% { transform: scale(1.1); border-color: #ef4444; box-shadow: 0 0 35px rgba(239, 68, 68, 0.8); }
            100% { transform: scale(1.0); border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
        }
        .highlight-beat {
            animation: beatSnap 0.2s cubic-bezier(0.1, 0.9, 0.2, 1) forwards !important;
            border-color: #ef4444 !important;
            z-index: 20;
        }

        .content-active {
            transform: scale(1.08);
            transition: transform 0.1s ease-out;
            color: #b91c1c; 
        }

        .responsive-emoji {
            font-size: min(10vw, 13vh);
            line-height: 1;
        }
        .responsive-text {
            font-size: min(5vw, 6vh);
            line-height: 1.2;
            margin-top: 0.5rem;
            color: #1e293b;
        }
        .text-only-mode {
            font-size: min(7vw, 9vh);
            color: #1e293b;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TERRAIN_TYPES = {
            '산지': { icon: '⛰️', color: 'bg-green-50' },
            '하천': { icon: '🏞️', color: 'bg-blue-50' },
            '평야': { icon: '🌾', color: 'bg-yellow-50' },
            '해안': { icon: '🏖️', color: 'bg-cyan-50' }
        };

        const STAGES_DATA = [
            ['하천', '하천', '하천', '하천', '산지', '하천', '산지', '하천'], // 1단계
            ['평야', '산지', '평야', '평야', '하천', '평야', '산지', '평야'], // 2단계
            ['해안', '해안', '산지', '해안', '해안', '하천', '해안', '해안'], // 3단계
            ['산지', '산지', '하천', '평야', '산지', '산지', '해안', '산지'], // 4단계
            ['하천', '평야', '해안', '산지', '평야', '하천', '산지', '해안']  // 5단계
        ];

        // 🔥 수학적으로 완벽하게 계산된 오디오 그리드 (160 BPM 기준)
        const INTRO_VOCALS_END = 3.000; // "원투쓰리고!" 까지 (8박자)
        const GAME_START_TIME = 6.000;  // "삑삑삑삑 삑삑삑삑" 종료 시점 (정확히 16박자 이후 본게임 시작!)
        const BEAT_DURATION = 0.375;    // 1박자 = 0.375초 (1칸 이동 시간)

        function App() {
            // 게임 상태: ready -> vocals(원투쓰리고) -> preparing(삑삑 대기) -> playing(본게임) -> end
            const [gameState, setGameState] = useState('ready'); 
            const [currentStage, setCurrentStage] = useState(0);
            const [cardDisplayMode, setCardDisplayMode] = useState('image-and-text'); 
            const [highlightIndex, setHighlightIndex] = useState(-1);
            
            const audioRef = useRef(null);

            // 🎵 네이티브 오디오 기반 초정밀 메인 엔진
            useEffect(() => {
                let animationFrameId;

                const trackTime = () => {
                    if (gameState !== 'ready' && gameState !== 'end' && audioRef.current && !audioRef.current.paused) {
                        const t = audioRef.current.currentTime;

                        // 1. 본 게임 시작 (6.0초 이후)
                        if (t >= GAME_START_TIME) {
                            if (gameState !== 'playing') setGameState('playing');
                            
                            const playTime = t - GAME_START_TIME;
                            const totalBeatsElapsed = Math.floor(playTime / BEAT_DURATION);
                            
                            // 5단계(80비트) 종료 처리
                            if (totalBeatsElapsed >= 80) {
                                setGameState('end');
                                audioRef.current.pause();
                                return;
                            }

                            // 단계 계산 (1단계 = 16박자 = 8칸 x 2바퀴)
                            const newStage = Math.floor(totalBeatsElapsed / 16);
                            if (newStage !== currentStage) {
                                setCurrentStage(newStage);
                            }

                            // 하이라이트 인덱스 계산 (0~7 순환)
                            const targetIndex = totalBeatsElapsed % 8;
                            setHighlightIndex(prev => prev !== targetIndex ? targetIndex : prev);
                        } 
                        // 2. 준비 삑삑 구간 (3.0초 ~ 6.0초) - 하이라이트 끄기
                        else if (t >= INTRO_VOCALS_END && t < GAME_START_TIME) {
                            if (gameState !== 'preparing') setGameState('preparing');
                            setHighlightIndex(-1);
                        }
                        // 3. 인트로 보컬 구간 (0초 ~ 3.0초) - 하이라이트 끄기
                        else {
                            if (gameState !== 'vocals') setGameState('vocals');
                            setHighlightIndex(-1);
                        }
                    }
                    
                    if (gameState !== 'ready' && gameState !== 'end') {
                        animationFrameId = requestAnimationFrame(trackTime);
                    }
                };

                if (gameState !== 'ready' && gameState !== 'end') {
                    animationFrameId = requestAnimationFrame(trackTime);
                }

                return () => cancelAnimationFrame(animationFrameId);
            }, [gameState, currentStage]);

            // 오디오 끝날 때 자연스럽게 종료
            const handleAudioEnded = () => {
                setGameState('end');
            };

            const startGame = () => {
                if (audioRef.current) {
                    setCurrentStage(0);
                    setHighlightIndex(-1);
                    setGameState('vocals');
                    
                    audioRef.current.currentTime = 0;
                    audioRef.current.play().catch(error => {
                        console.error("오디오 재생 실패:", error);
                        alert("오디오 재생 권한이 필요합니다.");
                        setGameState('ready');
                    });
                }
            };

            const restartGame = () => {
                setGameState('ready'); 
                if (audioRef.current) {
                    audioRef.current.pause();
                    audioRef.current.currentTime = 0;
                }
            };

            return (
                <div className="w-screen h-screen flex flex-col relative overflow-hidden bg-white text-gray-900">
                    
                    {/* 깃허브에 올린 MP3 파일 구동 */}
                    <audio 
                        ref={audioRef} 
                        src="./song.mp3" 
                        preload="auto"
                        onEnded={handleAudioEnded}
                    ></audio>

                    {/* --- 대기 및 종료 화면 --- */}
                    {(gameState === 'ready' || gameState === 'end') && (
                        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center p-8 bg-slate-50/95 backdrop-blur-sm transition-all duration-300">
                            
                            {gameState === 'ready' && (
                                <div className="w-full max-w-4xl flex flex-col items-center animate-fade-in">
                                    <h1 className="text-6xl md:text-8xl font-black mb-12 text-gray-900 tracking-tight text-center drop-shadow-sm">
                                        단어 리듬 게임
                                    </h1>
                                    
                                    {/* 화면 제시 방식 선택 (초깔끔 모드) */}
                                    <div className="w-full bg-white p-10 rounded-[2rem] shadow-xl border border-slate-200 mb-12 flex flex-col items-center">
                                        <p className="text-3xl font-bold mb-8 text-slate-700">화면 표시 방식</p>
                                        <div className="flex flex-wrap gap-5 justify-center">
                                            <button onClick={() => setCardDisplayMode('image-only')} className={`px-10 py-5 text-2xl font-bold rounded-2xl transition-all ${cardDisplayMode === 'image-only' ? 'bg-blue-600 text-white shadow-lg scale-105' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>🖼️ 그림만</button>
                                            <button onClick={() => setCardDisplayMode('image-and-text')} className={`px-10 py-5 text-2xl font-bold rounded-2xl transition-all ${cardDisplayMode === 'image-and-text' ? 'bg-blue-600 text-white shadow-lg scale-105' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>🖼️ + ✍️ 그림과 단어</button>
                                            <button onClick={() => setCardDisplayMode('text-only')} className={`px-10 py-5 text-2xl font-bold rounded-2xl transition-all ${cardDisplayMode === 'text-only' ? 'bg-blue-600 text-white shadow-lg scale-105' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>✍️ 단어만</button>
                                        </div>
                                    </div>

                                    <button onClick={startGame} className="px-24 py-8 bg-gray-900 text-white font-black text-5xl rounded-full shadow-2xl hover:scale-105 active:scale-95 transition-all">
                                        ▶ 플레이 시작
                                    </button>
                                </div>
                            )}

                            {gameState === 'end' && (
                                <div className="text-center animate-fade-in">
                                    <div className="text-[10rem] mb-6">🎉</div>
                                    <h2 className="text-8xl font-black mb-12 text-gray-900">완주를 축하합니다!</h2>
                                    <button onClick={restartGame} className="px-16 py-6 bg-blue-600 text-white text-4xl font-bold rounded-full shadow-lg hover:scale-105 transition-all">처음으로 돌아가기</button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* --- 상단 헤더 --- */}
                    <header className="h-[12vh] shrink-0 flex justify-between items-center px-10 border-b-2 border-slate-200 bg-white z-10 shadow-sm">
                        <div className="text-5xl">📢</div>
                        
                        <div className="flex-1 flex flex-col items-center justify-center">
                            {/* 게임 진행 상태에 따른 직관적인 메시지 표시 */}
                            {gameState === 'vocals' && (
                                <div className="text-4xl font-black text-slate-800 animate-pulse">
                                    🎤 원! 투! 쓰리! 고!
                                </div>
                            )}
                            {gameState === 'preparing' && (
                                <div className="text-3xl font-black text-red-500 animate-pulse bg-red-50 px-8 py-3 rounded-full border border-red-200">
                                    👀 카드를 미리 읽어보며 리듬을 타세요!
                                </div>
                            )}
                            {gameState === 'playing' && (
                                <span className="text-4xl font-black text-slate-800 bg-slate-100 px-10 py-3 rounded-full border border-slate-200 shadow-inner">
                                    {currentStage + 1} / 5 단계
                                </span>
                            )}
                        </div>

                        <div className="text-5xl opacity-0">📢</div> {/* 레이아웃 균형 */}
                    </header>

                    {/* --- 메인 카드 영역 --- */}
                    <main className="flex-1 min-h-0 w-full flex items-center justify-center p-6 md:p-10 bg-slate-100">
                        <div className="w-full h-full max-w-7xl grid grid-cols-4 grid-rows-2 gap-5 md:gap-8">
                            {STAGES_DATA[currentStage].map((terrain, index) => {
                                const isHighlighted = index === highlightIndex;

                                return (
                                    <div 
                                        key={index}
                                        className={`
                                            relative w-full h-full rounded-3xl border-[6px] overflow-hidden bg-white shadow-sm
                                            transition-all duration-[50ms]
                                            ${isHighlighted ? 'highlight-beat' : 'border-slate-300'}
                                        `}
                                    >
                                        <div className={`absolute inset-0 flex flex-col items-center justify-center p-2 ${isHighlighted ? 'content-active bg-red-50/40' : TERRAIN_TYPES[terrain].color}`}>
                                            
                                            {cardDisplayMode !== 'text-only' && (
                                                <span className="responsive-emoji drop-shadow-sm">
                                                    {TERRAIN_TYPES[terrain].icon}
                                                </span>
                                            )}
                                            
                                            {cardDisplayMode !== 'image-only' && (
                                                <span className={`font-black tracking-wider text-center ${cardDisplayMode === 'text-only' ? 'text-only-mode' : 'responsive-text'}`}>
                                                    {terrain}
                                                </span>
                                            )}

                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {/* --- 하단 푸터 --- */}
                    <footer className="h-[10vh] shrink-0 bg-white border-t-2 border-slate-200 flex justify-between items-center px-10 z-10 shadow-sm">
                        <div className="text-3xl font-black text-slate-600 flex-1 text-center tracking-wide">
                            🔥 비트에 맞춰 다 함께 큰 소리로 외쳐요!
                        </div>
                        <button onClick={restartGame} className="px-8 py-4 bg-slate-200 text-slate-700 font-bold text-2xl rounded-2xl hover:bg-slate-300 active:scale-95 transition-all">
                            종료 ⏹️
                        </button>
                    </footer>
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
