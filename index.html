<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>단어 리듬 게임 (지형편)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Jua', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 0);
            background-size: 40px 40px;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 0.34초 비트에 맞춘 역동적인 Snap 애니메이션 */
        @keyframes beatSnap {
            0% { transform: scale(1.15); border-color: #ef4444; box-shadow: 0 0 45px rgba(239, 68, 68, 1); }
            100% { transform: scale(1.0); border-color: #ef4444; box-shadow: 0 0 15px rgba(239, 68, 68, 0.5); }
        }
        .highlight-beat {
            animation: beatSnap 0.3s cubic-bezier(0.1, 0.9, 0.2, 1) forwards !important;
            border-color: #ef4444 !important;
            z-index: 20;
            opacity: 1 !important;
        }

        .content-active {
            transform: scale(1.05);
            transition: transform 0.1s ease-out;
        }

        .responsive-emoji {
            font-size: min(12vw, 15vh);
            line-height: 1;
        }
        .responsive-text {
            font-size: min(5vw, 6vh);
            line-height: 1.2;
            margin-top: 0.5rem;
        }
        .text-only-mode {
            font-size: min(8vw, 10vh);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TERRAIN_TYPES = {
            '산지': { icon: '⛰️', color: 'bg-green-100' },
            '하천': { icon: '🏞️', color: 'bg-blue-100' },
            '평야': { icon: '🌾', color: 'bg-yellow-100' },
            '해안': { icon: '🏖️', color: 'bg-cyan-100' }
        };

        const STAGES_DATA = [
            ['하천', '하천', '하천', '하천', '산지', '하천', '산지', '하천'], // 1단계
            ['평야', '산지', '평야', '평야', '하천', '평야', '산지', '평야'], // 2단계
            ['해안', '해안', '산지', '해안', '해안', '하천', '해안', '해안'], // 3단계
            ['산지', '산지', '하천', '평야', '산지', '산지', '해안', '산지'], // 4단계
            ['하천', '평야', '해안', '산지', '평야', '하천', '산지', '해안']  // 5단계
        ];

        function App() {
            const [gameState, setGameState] = useState('ready'); // ready, playing, end
            const [currentStage, setCurrentStage] = useState(0);
            const [showVideo, setShowVideo] = useState(false);
            const [cardDisplayMode, setCardDisplayMode] = useState('image-and-text'); 
            
            // 🔥 오디오 동기화의 핵심 세팅 (초 단위)
            const [introStartTime, setIntroStartTime] = useState(2.75); // "삑삑"이 시작되는 영상 내 시간 (2.75초)
            const [beatDuration, setBeatDuration] = useState(0.34);     // 1칸 이동하는 속도 (0.34초)
            
            const [highlightIndex, setHighlightIndex] = useState(-1);
            
            const ytPlayerRef = useRef(null);
            const containerRef = useRef(null);

            // 유튜브 API 초기화
            useEffect(() => {
                const loadYoutubeAPI = () => {
                    if (!window.YT) {
                        const tag = document.createElement('script');
                        tag.src = "https://www.youtube.com/iframe_api";
                        const firstScriptTag = document.getElementsByTagName('script')[0];
                        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
                    }
                    
                    window.onYouTubeIframeAPIReady = () => {
                        ytPlayerRef.current = new window.YT.Player('yt-player-container', {
                            videoId: '_RiQjsu1KIw',
                            playerVars: { 'controls': 0, 'disablekb': 1, 'rel': 0, 'playsinline': 1 },
                            events: {
                                'onReady': () => console.log('유튜브 오디오 엔진 장전 완료!'),
                            }
                        });
                    };
                };

                loadYoutubeAPI();
            }, []);

            // 🎵 실제 영상의 시간(초)을 읽어와서 카드를 움직이는 초정밀 엔진
            useEffect(() => {
                let animationFrameId;

                const trackTime = () => {
                    if (gameState === 'playing' && ytPlayerRef.current && typeof ytPlayerRef.current.getCurrentTime === 'function') {
                        const currentTime = ytPlayerRef.current.getCurrentTime();

                        // 아직 '삑삑' 시작 시간(introStartTime)에 도달하지 않았다면 인트로 유지
                        if (currentTime < introStartTime) {
                            setHighlightIndex(-1);
                        } else {
                            // '삑삑' 시작 이후 경과 시간
                            const playTime = currentTime - introStartTime;
                            
                            // 현재 몇 번째 비트인지 계산 (총 80비트 = 16비트 * 5단계)
                            const totalBeatsElapsed = Math.floor(playTime / beatDuration);
                            
                            // 5단계(80비트)를 넘어갔다면 게임 종료
                            if (totalBeatsElapsed >= 80) {
                                setGameState('end');
                                ytPlayerRef.current.pauseVideo();
                                return;
                            }

                            // 현재 단계 계산 (1단계 = 16비트)
                            const newStage = Math.floor(totalBeatsElapsed / 16);
                            if (newStage !== currentStage) {
                                setCurrentStage(newStage);
                            }

                            // 현재 하이라이트 칸 계산 (0~7 순환)
                            const targetIndex = totalBeatsElapsed % 8;
                            setHighlightIndex(prev => prev !== targetIndex ? targetIndex : prev);
                        }
                    }
                    animationFrameId = requestAnimationFrame(trackTime);
                };

                if (gameState === 'playing') {
                    animationFrameId = requestAnimationFrame(trackTime);
                }

                return () => cancelAnimationFrame(animationFrameId);
            }, [gameState, introStartTime, beatDuration, currentStage]);

            const startGame = () => {
                if (ytPlayerRef.current && typeof ytPlayerRef.current.seekTo === 'function') {
                    setGameState('playing');
                    setCurrentStage(0);
                    setHighlightIndex(-1);
                    ytPlayerRef.current.seekTo(0, true);
                    ytPlayerRef.current.playVideo();
                } else {
                    alert('유튜브 오디오를 불러오는 중입니다. 1~2초 후 다시 눌러주세요!');
                }
            };

            const restartGame = () => {
                setGameState('ready'); 
                if (ytPlayerRef.current) {
                    ytPlayerRef.current.pauseVideo();
                    ytPlayerRef.current.seekTo(0, true);
                }
            };

            return (
                <div className="w-screen h-screen flex flex-col relative overflow-hidden text-gray-800">
                    
                    {/* 숨겨진 유튜브 플레이어 컨테이너 */}
                    <div 
                        className={`absolute bottom-[14vh] right-6 rounded-2xl shadow-2xl border-4 border-black transition-all duration-300 overflow-hidden ${showVideo ? 'opacity-100 z-50 translate-y-0' : 'opacity-0 -z-10 translate-y-10 pointer-events-none'}`}
                        style={{ width: '384px', height: '216px' }}
                    >
                        <div id="yt-player-container" className="w-full h-full"></div>
                    </div>

                    {/* --- 대기/성공 화면 오버레이 --- */}
                    {gameState !== 'playing' && (
                        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center p-12 bg-white/95 transition-colors duration-300">
                            
                            {gameState === 'ready' && (
                                <>
                                    <h1 className="text-7xl md:text-8xl font-black mb-8 text-black drop-shadow-md tracking-widest text-center">
                                        🎵 단어 리듬 게임 🎵
                                    </h1>
                                    
                                    {/* 화면 제시 방식 선택 */}
                                    <div className="mb-6 p-6 bg-gray-100 rounded-3xl border-4 border-black text-center shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] w-full max-w-4xl flex flex-col items-center">
                                        <p className="text-2xl font-bold mb-4">화면 제시 방식</p>
                                        <div className="flex flex-wrap gap-4 justify-center">
                                            <button onClick={() => setCardDisplayMode('image-only')} className={`px-6 py-3 text-2xl font-black rounded-xl border-4 border-black transition-all ${cardDisplayMode === 'image-only' ? 'bg-yellow-400 shadow-none translate-y-1' : 'bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-yellow-50'}`}>🖼️ 그림만</button>
                                            <button onClick={() => setCardDisplayMode('image-and-text')} className={`px-6 py-3 text-2xl font-black rounded-xl border-4 border-black transition-all ${cardDisplayMode === 'image-and-text' ? 'bg-yellow-400 shadow-none translate-y-1' : 'bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-yellow-50'}`}>🖼️✍️ 그림+단어</button>
                                            <button onClick={() => setCardDisplayMode('text-only')} className={`px-6 py-3 text-2xl font-black rounded-xl border-4 border-black transition-all ${cardDisplayMode === 'text-only' ? 'bg-yellow-400 shadow-none translate-y-1' : 'bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-yellow-50'}`}>✍️ 단어만</button>
                                        </div>
                                    </div>

                                    {/* 🔥 소리/화면 완벽 동기화 튜닝 패널 */}
                                    <div className="mb-10 p-6 bg-blue-50 rounded-3xl border-4 border-blue-300 flex flex-col items-center shadow-inner w-full max-w-4xl">
                                        <div className="text-2xl font-black text-blue-800 mb-6 flex items-center gap-2">
                                            ⚙️ 정밀 싱크 튜닝 <span className="text-lg font-normal text-gray-600">(선생님 전용 설정)</span>
                                        </div>
                                        
                                        <div className="flex gap-10 w-full justify-center">
                                            {/* 1. 삑삑 시작점 조절 */}
                                            <div className="flex flex-col items-center">
                                                <span className="text-xl font-bold mb-3">1️⃣ '삑' 소리 시작점</span>
                                                <div className="flex items-center gap-3">
                                                    <button onClick={() => setIntroStartTime(prev => Math.max(0, parseFloat((prev - 0.05).toFixed(2))))} className="px-4 py-2 bg-white border-2 border-black rounded-xl font-bold text-2xl active:bg-gray-200 hover:scale-105">-</button>
                                                    <div className="text-3xl font-black w-28 text-center bg-white border-2 border-gray-300 py-2 rounded-xl text-blue-700">{introStartTime}초</div>
                                                    <button onClick={() => setIntroStartTime(prev => parseFloat((prev + 0.05).toFixed(2)))} className="px-4 py-2 bg-white border-2 border-black rounded-xl font-bold text-2xl active:bg-gray-200 hover:scale-105">+</button>
                                                </div>
                                                <span className="text-sm text-gray-500 mt-2 text-center">박자가 늦으면 '-'<br/>박자가 빠르면 '+'</span>
                                            </div>

                                            {/* 2. 비트 속도 조절 */}
                                            <div className="flex flex-col items-center border-l-2 border-blue-200 pl-10">
                                                <span className="text-xl font-bold mb-3">2️⃣ 1칸 이동 속도</span>
                                                <div className="flex items-center gap-3">
                                                    <button onClick={() => setBeatDuration(prev => Math.max(0.1, parseFloat((prev - 0.01).toFixed(2))))} className="px-4 py-2 bg-white border-2 border-black rounded-xl font-bold text-2xl active:bg-gray-200 hover:scale-105">-</button>
                                                    <div className="text-3xl font-black w-28 text-center bg-white border-2 border-gray-300 py-2 rounded-xl text-green-600">{beatDuration}초</div>
                                                    <button onClick={() => setBeatDuration(prev => parseFloat((prev + 0.01).toFixed(2)))} className="px-4 py-2 bg-white border-2 border-black rounded-xl font-bold text-2xl active:bg-gray-200 hover:scale-105">+</button>
                                                </div>
                                                <span className="text-sm text-gray-500 mt-2 text-center">하이라이트가 소리를<br/>추월하면 '+' 눌러서 늦춤</span>
                                            </div>
                                        </div>
                                    </div>

                                    <button onClick={startGame} className="px-16 py-6 bg-green-500 border-4 border-black text-black font-black text-5xl md:text-6xl rounded-2xl shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] hover:-translate-y-1 hover:shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] active:translate-y-2 active:shadow-none transition-all">
                                        게임 시작!
                                    </button>
                                </>
                            )}

                            {gameState === 'end' && (
                                <>
                                    <div className="text-[10rem] mb-4">🎉</div>
                                    <h2 className="text-8xl font-black mb-10 text-green-600 drop-shadow-md tracking-widest">완주 성공!</h2>
                                    <button onClick={restartGame} className="px-12 py-5 bg-white border-4 border-black text-4xl font-black rounded-2xl shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-y-2 transition-all">다시 하기</button>
                                </>
                            )}
                        </div>
                    )}

                    <header className="h-[12vh] shrink-0 flex justify-between items-center px-6 md:px-10 border-b-4 border-gray-300 bg-white shadow-sm z-10">
                        <div className="text-5xl md:text-6xl drop-shadow-md">📢</div>
                        
                        <div className="flex-1 max-w-2xl mx-8 flex flex-col items-center gap-2">
                            <span className="text-5xl md:text-6xl font-black tracking-widest text-black">
                                {currentStage + 1} / 5 단계
                            </span>
                            {/* 인트로 대기 중일 때는 '준비!', 본 게임 시작 시 하이라이트 진행 상황을 보여줌 */}
                            {highlightIndex === -1 ? (
                                <div className="text-2xl font-bold text-red-500 animate-pulse">원! 투! 쓰리! 고! 준비하세요!</div>
                            ) : (
                                <div className="text-xl font-bold text-blue-600">리듬을 타며 다 함께 외쳐요!</div>
                            )}
                        </div>

                        <div className="flex items-center">
                            <button onClick={() => setShowVideo(!showVideo)} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-lg md:text-xl font-bold active:scale-95 transition-transform shadow-md">
                                {showVideo ? '영상 끄기 🙈' : '영상 보기 📺'}
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 min-h-0 w-full flex items-center justify-center p-4 bg-slate-100/50">
                        <div className="w-full h-full max-w-7xl max-h-[80vh] grid grid-cols-4 grid-rows-2 gap-3 md:gap-5">
                            {STAGES_DATA[currentStage].map((terrain, index) => {
                                const isHighlighted = index === highlightIndex;

                                return (
                                    <div 
                                        key={index}
                                        className={`
                                            relative w-full h-full rounded-xl border-[6px] md:border-8 overflow-hidden
                                            transition-colors duration-[50ms] shadow-sm
                                            ${TERRAIN_TYPES[terrain].color}
                                            ${isHighlighted ? 'highlight-beat' : 'border-gray-800 opacity-60'}
                                        `}
                                    >
                                        <div className={`absolute inset-0 flex flex-col items-center justify-center p-2 ${isHighlighted ? 'content-active' : ''}`}>
                                            
                                            {cardDisplayMode !== 'text-only' && (
                                                <span className="responsive-emoji drop-shadow-md">
                                                    {TERRAIN_TYPES[terrain].icon}
                                                </span>
                                            )}
                                            
                                            {cardDisplayMode !== 'image-only' && (
                                                <span className={`font-black text-white tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] text-center ${cardDisplayMode === 'text-only' ? 'text-only-mode' : 'responsive-text'}`}
                                                      style={{ WebkitTextStroke: '2px black' }}>
                                                    {terrain}
                                                </span>
                                            )}

                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    <footer className="h-[12vh] shrink-0 bg-white border-t-4 border-gray-300 flex justify-between items-center px-6 md:px-12 z-10 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
                        <div className="text-3xl md:text-4xl font-black text-red-500 tracking-wider flex-1 text-center animate-pulse">
                            🎤 비트에 맞춰 붉은 칸을 큰 소리로 외쳐요! (8칸 x 2번 반복)
                        </div>
                        <button onClick={restartGame} className="px-6 py-3 md:px-8 md:py-4 bg-gray-100 border-4 border-black text-black font-black text-2xl md:text-3xl rounded-xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-gray-200 active:translate-y-1 active:shadow-none transition-all">
                            처음으로 🔄
                        </button>
                    </footer>
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
