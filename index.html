<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>단어 리듬 게임 (지형편)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Jua', sans-serif;
            background-color: #f1f5f9;
            background-image: radial-gradient(#cbd5e1 1px, transparent 0);
            background-size: 40px 40px;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        @keyframes popText {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popText 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        const TERRAIN_TYPES = {
            '산지': { icon: '⛰️', color: 'bg-green-100' },
            '하천': { icon: '🏞️', color: 'bg-blue-100' },
            '평야': { icon: '🌾', color: 'bg-yellow-100' },
            '해안': { icon: '🏖️', color: 'bg-cyan-100' }
        };

        const STAGES_DATA = [
            ['하천', '하천', '하천', '하천', '산지', '하천', '산지', '하천'], // 1단계
            ['평야', '산지', '평야', '평야', '하천', '평야', '산지', '평야'], // 2단계
            ['해안', '해안', '산지', '해안', '해안', '하천', '해안', '해안'], // 3단계
            ['산지', '산지', '하천', '평야', '산지', '산지', '해안', '산지'], // 4단계
            ['하천', '평야', '해안', '산지', '평야', '하천', '산지', '해안']  // 5단계
        ];

        function App() {
            const [gameState, setGameState] = useState('ready'); 
            const [currentStage, setCurrentStage] = useState(0);
            const [revealedCards, setRevealedCards] = useState(Array(8).fill(false));
            const [isPlayingBgm, setIsPlayingBgm] = useState(false);
            const [showVideo, setShowVideo] = useState(false);
            
            const ytRef = useRef(null);

            // 유튜브 iframe 제어 함수 (postMessage 활용)
            const sendYTCmd = (cmd, args = []) => {
                if (ytRef.current && ytRef.current.contentWindow) {
                    ytRef.current.contentWindow.postMessage(
                        JSON.stringify({ event: 'command', func: cmd, args: args }), '*'
                    );
                }
            };

            const startGame = () => {
                setGameState('playing');
                setCurrentStage(0);
                setRevealedCards(Array(8).fill(false));
                
                // 게임 시작 시 유튜브 영상 0초로 되돌리고 재생
                sendYTCmd('seekTo', [0, true]);
                sendYTCmd('playVideo');
                setIsPlayingBgm(true);
            };

            const toggleCard = (index) => {
                const newRevealed = [...revealedCards];
                newRevealed[index] = !newRevealed[index];
                setRevealedCards(newRevealed);
            };

            const nextStage = () => {
                if (currentStage < 4) {
                    setCurrentStage(prev => prev + 1);
                    setRevealedCards(Array(8).fill(false));
                }
            };

            const prevStage = () => {
                if (currentStage > 0) {
                    setCurrentStage(prev => prev - 1);
                    setRevealedCards(Array(8).fill(false));
                }
            };

            const toggleBgm = () => {
                if (isPlayingBgm) {
                    sendYTCmd('pauseVideo');
                } else {
                    sendYTCmd('playVideo');
                }
                setIsPlayingBgm(!isPlayingBgm);
            };

            return (
                <div className="w-full h-full flex flex-col items-center justify-center relative">
                    
                    {/* 유튜브 Iframe (숨기기/보이기 기능 지원) */}
                    <iframe 
                        ref={ytRef}
                        className={`absolute bottom-4 right-4 rounded-2xl shadow-2xl border-4 border-black transition-all duration-300 ${showVideo ? 'opacity-100 z-50 translate-y-0' : 'opacity-0 -z-10 translate-y-10 pointer-events-none'}`}
                        width="384" 
                        height="216" 
                        src="https://www.youtube.com/embed/_RiQjsu1KIw?enablejsapi=1&controls=0&rel=0&playsinline=1" 
                        frameBorder="0"
                        allow="autoplay; encrypted-media"
                    ></iframe>

                    {/* --- 대기 화면 --- */}
                    {gameState === 'ready' && (
                        <div className="flex flex-col items-center bg-white/95 p-12 rounded-3xl shadow-2xl z-10 border-4 border-black">
                            <h1 className="text-7xl font-black mb-6 text-black drop-shadow-md tracking-widest">
                                🎵 단어 리듬 게임 🎵
                            </h1>
                            <p className="text-2xl text-gray-600 mb-10 text-center">
                                '무 뽑아 장아찌~' 비트에 맞춰 화면을 터치하세요!<br/>
                                (시작 버튼을 누르면 원본 오디오가 자동 재생됩니다)
                            </p>
                            
                            <button 
                                onClick={startGame}
                                className="px-16 py-6 bg-yellow-400 border-4 border-black text-black font-black text-5xl rounded-2xl shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] hover:translate-y-1 hover:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-y-2 active:shadow-none transition-all"
                            >
                                게임 시작!
                            </button>
                        </div>
                    )}

                    {/* --- 게임 화면 --- */}
                    {gameState === 'playing' && (
                        <div className="w-full h-full flex flex-col items-center justify-between p-4">
                            
                            {/* 상단 UI */}
                            <div className="w-full flex justify-between items-center px-10 pt-4 h-[15%]">
                                <div className="text-7xl drop-shadow-lg">📢</div>
                                <div className="text-8xl font-black tracking-widest text-black drop-shadow-md flex items-center gap-4">
                                    <button onClick={prevStage} className={`text-6xl text-gray-400 hover:text-black transition-colors ${currentStage === 0 ? 'invisible' : ''}`}>◀</button>
                                    <span>{currentStage + 1} / 5</span>
                                    <button onClick={nextStage} className={`text-6xl text-gray-400 hover:text-black transition-colors ${currentStage === 4 ? 'invisible' : ''}`}>▶</button>
                                </div>
                                <div className="flex flex-col items-end gap-3">
                                    <button 
                                        onClick={toggleBgm}
                                        className="px-6 py-3 bg-black text-white rounded-full text-2xl font-bold shadow-md active:scale-95 transition-transform"
                                    >
                                        {isPlayingBgm ? '음악 끄기 ⏸️' : '음악 켜기 ▶️'}
                                    </button>
                                    <button 
                                        onClick={() => setShowVideo(!showVideo)}
                                        className="px-6 py-3 bg-blue-600 text-white rounded-full text-xl font-bold shadow-md active:scale-95 transition-transform"
                                    >
                                        {showVideo ? '원본 영상 숨기기 🙈' : '원본 영상 보기 📺'}
                                    </button>
                                </div>
                            </div>

                            {/* 4x2 격자 배열 */}
                            <div className="w-[95%] max-w-7xl h-[80%] grid grid-cols-4 grid-rows-2 gap-4 pb-6">
                                {STAGES_DATA[currentStage].map((terrain, index) => (
                                    <div 
                                        key={index}
                                        onClick={() => toggleCard(index)}
                                        className={`
                                            relative w-full h-full border-8 cursor-pointer flex items-center justify-center overflow-hidden
                                            transition-all duration-200 shadow-[6px_6px_0px_0px_rgba(0,0,0,0.3)]
                                            ${TERRAIN_TYPES[terrain].color}
                                            ${revealedCards[index] ? 'border-green-500 scale-[0.98]' : 'border-black'}
                                        `}
                                    >
                                        <span className="text-[12rem] opacity-40 select-none">
                                            {TERRAIN_TYPES[terrain].icon}
                                        </span>

                                        {revealedCards[index] && (
                                            <div className="absolute inset-0 flex items-center justify-center bg-black/20 backdrop-blur-sm">
                                                <span className="text-[7rem] font-black text-white text-stroke animate-pop tracking-widest drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)]"
                                                      style={{ WebkitTextStroke: '4px black' }}>
                                                    {terrain}
                                                </span>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>

                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
