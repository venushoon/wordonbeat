<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>단어 리듬 게임 (지형편)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Jua', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 0);
            background-size: 40px 40px;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* 텍스트 팝업 애니메이션 */
        @keyframes popText {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popText 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        /* 반응형 글자 크기 최적화 (화면 밖으로 튀어나가지 않게) */
        .responsive-emoji {
            font-size: min(12vw, 15vh);
            line-height: 1;
        }
        .responsive-text {
            font-size: min(5vw, 6vh);
            line-height: 1.2;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TERRAIN_TYPES = {
            '산지': { icon: '⛰️', color: 'bg-green-100' },
            '하천': { icon: '🏞️', color: 'bg-blue-100' },
            '평야': { icon: '🌾', color: 'bg-yellow-100' },
            '해안': { icon: '🏖️', color: 'bg-cyan-100' }
        };

        const STAGES_DATA = [
            ['하천', '하천', '하천', '하천', '산지', '하천', '산지', '하천'], // 1단계
            ['평야', '산지', '평야', '평야', '하천', '평야', '산지', '평야'], // 2단계
            ['해안', '해안', '산지', '해안', '해안', '하천', '해안', '해안'], // 3단계
            ['산지', '산지', '하천', '평야', '산지', '산지', '해안', '산지'], // 4단계
            ['하천', '평야', '해안', '산지', '평야', '하천', '산지', '해안']  // 5단계
        ];

        const STAGE_DURATION = 8; // 8비트 x 2번 = 16비트 (약 8초로 설정)

        function App() {
            const [gameState, setGameState] = useState('ready'); // ready, playing, failed, end
            const [currentStage, setCurrentStage] = useState(0);
            const [revealedCards, setRevealedCards] = useState(Array(8).fill(false));
            const [isPlayingBgm, setIsPlayingBgm] = useState(false);
            const [showVideo, setShowVideo] = useState(false);
            const [cardDisplayMode, setCardDisplayMode] = useState('image-only'); 
            const [mistakes, setMistakes] = useState(0); 
            const [stageTimeLeft, setStageTimeLeft] = useState(STAGE_DURATION); 
            
            const ytRef = useRef(null);

            const sendYTCmd = (cmd, args = []) => {
                if (ytRef.current && ytRef.current.contentWindow) {
                    ytRef.current.contentWindow.postMessage(
                        JSON.stringify({ event: 'command', func: cmd, args: args }), '*'
                    );
                }
            };

            const startGame = () => {
                setGameState('playing');
                setCurrentStage(0);
                setRevealedCards(Array(8).fill(false));
                setMistakes(0); 
                setStageTimeLeft(STAGE_DURATION); 
                
                sendYTCmd('seekTo', [0, true]);
                sendYTCmd('playVideo');
                setIsPlayingBgm(true);
            };

            const restartGame = () => {
                setGameState('ready'); 
                sendYTCmd('pauseVideo'); 
                setIsPlayingBgm(false);
            };

            const toggleCard = (index) => {
                if (gameState !== 'playing') return; 
                const newRevealed = [...revealedCards];
                newRevealed[index] = !newRevealed[index];
                setRevealedCards(newRevealed);

                // 현재 미션은 항상 "하천" 찾기로 고정 (원하시면 단계별로 변경 가능)
                if (newRevealed[index] && STAGES_DATA[currentStage][index] !== '하천') {
                   setMistakes(prev => prev + 1);
                   if (mistakes >= 2) { // 3번 실수하면 실패
                       setGameState('failed');
                       sendYTCmd('pauseVideo');
                       setIsPlayingBgm(false);
                   }
                }
            };

            const nextStage = () => {
                if (currentStage < 4) {
                    setCurrentStage(prev => prev + 1);
                    setRevealedCards(Array(8).fill(false));
                    setStageTimeLeft(STAGE_DURATION); 
                } else {
                    setGameState('end'); 
                    sendYTCmd('pauseVideo');
                    setIsPlayingBgm(false);
                }
            };

            const toggleBgm = () => {
                if (isPlayingBgm) {
                    sendYTCmd('pauseVideo');
                } else {
                    sendYTCmd('playVideo');
                }
                setIsPlayingBgm(!isPlayingBgm);
            };

            // 타이머 로직 (8초)
            useEffect(() => {
                if (gameState === 'playing') {
                    const timerId = setInterval(() => {
                        setStageTimeLeft(prev => prev - 1);
                    }, 1000);

                    const timeoutId = setTimeout(() => {
                        nextStage();
                        clearInterval(timerId); 
                    }, STAGE_DURATION * 1000);

                    return () => {
                        clearTimeout(timeoutId);
                        clearInterval(timerId);
                    };
                }
            }, [currentStage, gameState]); 

            return (
                /* 전체 레이아웃: 100vh, flex-col로 구성하여 상단/중단/하단 영역을 명확히 나눔 */
                <div className="w-screen h-screen flex flex-col relative overflow-hidden text-gray-800">
                    
                    {/* 유튜브 Iframe */}
                    <iframe 
                        ref={ytRef}
                        className={`absolute bottom-[14vh] right-6 rounded-2xl shadow-2xl border-4 border-black transition-all duration-300 ${showVideo ? 'opacity-100 z-50 translate-y-0' : 'opacity-0 -z-10 translate-y-10 pointer-events-none'}`}
                        width="384" 
                        height="216" 
                        src="https://www.youtube.com/embed/_RiQjsu1KIw?enablejsapi=1&controls=0&rel=0&playsinline=1" 
                        frameBorder="0"
                        allow="autoplay; encrypted-media"
                    ></iframe>

                    {/* --- 대기/실패/성공 화면 오버레이 --- */}
                    {gameState !== 'playing' && (
                        <div className="absolute inset-0 z-50 bg-white/95 flex flex-col items-center justify-center p-12">
                            {gameState === 'ready' && (
                                <>
                                    <h1 className="text-7xl md:text-8xl font-black mb-12 text-black drop-shadow-md tracking-widest text-center">
                                        🎵 단어 리듬 게임 🎵
                                    </h1>
                                    <div className="mb-12 p-8 bg-gray-100 rounded-3xl border-4 border-black text-center shadow-[6px_6px_0px_0px_rgba(0,0,0,1)]">
                                        <p className="text-3xl md:text-4xl text-black font-bold mb-8">카드를 어떻게 보여줄까요?</p>
                                        <div className="flex flex-wrap gap-6 justify-center">
                                            <button 
                                                onClick={() => setCardDisplayMode('image-only')}
                                                className={`px-8 py-4 text-2xl md:text-3xl font-black rounded-xl border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:scale-105 active:scale-95 transition-all ${cardDisplayMode === 'image-only' ? 'bg-yellow-300' : 'bg-white'}`}
                                            >
                                                🖼️ 그림으로만
                                            </button>
                                            <button 
                                                onClick={() => setCardDisplayMode('image-and-text')}
                                                className={`px-8 py-4 text-2xl md:text-3xl font-black rounded-xl border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:scale-105 active:scale-95 transition-all ${cardDisplayMode === 'image-and-text' ? 'bg-yellow-300' : 'bg-white'}`}
                                            >
                                                🖼️✍️ 그림+단어
                                            </button>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={startGame}
                                        className="px-16 py-6 bg-green-500 border-4 border-black text-black font-black text-5xl md:text-6xl rounded-2xl shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] hover:-translate-y-1 hover:shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] active:translate-y-2 active:shadow-none transition-all"
                                    >
                                        게임 시작!
                                    </button>
                                </>
                            )}
                            {gameState === 'failed' && (
                                <>
                                    <div className="text-[10rem] mb-4">😞</div>
                                    <h2 className="text-8xl font-black mb-10 text-red-600 drop-shadow-md tracking-widest">미션 실패!</h2>
                                    <button onClick={restartGame} className="px-12 py-5 bg-white border-4 border-black text-4xl font-black rounded-2xl shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-y-2 transition-all">대기 화면으로</button>
                                </>
                            )}
                            {gameState === 'end' && (
                                <>
                                    <div className="text-[10rem] mb-4">🎉</div>
                                    <h2 className="text-8xl font-black mb-10 text-green-600 drop-shadow-md tracking-widest">미션 성공!</h2>
                                    <button onClick={restartGame} className="px-12 py-5 bg-white border-4 border-black text-4xl font-black rounded-2xl shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-y-2 transition-all">다시 하기</button>
                                </>
                            )}
                        </div>
                    )}

                    {/* --- 상단 헤더 영역 (고정 높이) --- */}
                    <header className="h-[12vh] shrink-0 flex justify-between items-center px-6 md:px-10 border-b-4 border-gray-300 bg-white shadow-sm z-10">
                        <div className="text-5xl md:text-6xl drop-shadow-md">📢</div>
                        <div className="text-5xl md:text-7xl font-black tracking-widest text-black flex items-center gap-4 md:gap-6">
                            <span>{currentStage + 1} / 5</span>
                            <span className="text-3xl md:text-5xl text-blue-600 bg-blue-100 px-4 py-1 rounded-full border-2 border-blue-300">
                                ⏳ {stageTimeLeft}초
                            </span>
                        </div>
                        <div className="flex flex-col md:flex-row items-end gap-2 md:gap-3">
                            <button onClick={toggleBgm} className="px-4 py-2 bg-black text-white rounded-lg text-lg md:text-xl font-bold active:scale-95 transition-transform">
                                {isPlayingBgm ? '음악 끄기 ⏸' : '음악 켜기 ▶'}
                            </button>
                            <button onClick={() => setShowVideo(!showVideo)} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-lg md:text-xl font-bold active:scale-95 transition-transform">
                                {showVideo ? '영상 숨기기 🙈' : '영상 보기 📺'}
                            </button>
                        </div>
                    </header>

                    {/* --- 메인 카드 영역 (유연한 공간 차지, 내부 스크롤 금지) --- */}
                    <main className="flex-1 min-h-0 w-full flex items-center justify-center p-4 bg-slate-100/50">
                        <div className="w-full h-full max-w-7xl max-h-[80vh] grid grid-cols-4 grid-rows-2 gap-3 md:gap-5">
                            {STAGES_DATA[currentStage].map((terrain, index) => (
                                <div 
                                    key={index}
                                    onClick={() => toggleCard(index)}
                                    className={`
                                        relative w-full h-full rounded-xl border-[6px] md:border-8 cursor-pointer overflow-hidden
                                        transition-transform duration-100 active:scale-95 shadow-md
                                        ${TERRAIN_TYPES[terrain].color}
                                        ${revealedCards[index] ? 'border-green-500 scale-[0.98]' : 'border-gray-800'}
                                    `}
                                >
                                    {/* 뒤집혔을 때 보여지는 컨텐츠 */}
                                    {revealedCards[index] && (
                                        <div className="absolute inset-0 flex flex-col items-center justify-center bg-black/10 backdrop-blur-[2px] animate-pop p-2">
                                            <span className="responsive-emoji drop-shadow-lg">
                                                {TERRAIN_TYPES[terrain].icon}
                                            </span>
                                            {cardDisplayMode === 'image-and-text' && (
                                                <span className="responsive-text font-black text-white tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] text-center"
                                                      style={{ WebkitTextStroke: '2px black' }}>
                                                    {terrain}
                                                </span>
                                            )}
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </main>

                    {/* --- 하단 컨트롤 바 영역 (고정 높이) --- */}
                    <footer className="h-[12vh] shrink-0 bg-white border-t-4 border-gray-300 flex justify-between items-center px-6 md:px-12 z-10 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
                        <div className="text-3xl md:text-4xl font-bold text-gray-800 flex gap-8">
                            <span>미션: <span className="text-red-600 font-black">"하천"</span></span>
                            <span>실수: <span className="text-red-600 font-black">{mistakes} / 3</span></span>
                        </div>
                        <button 
                            onClick={restartGame}
                            className="px-6 py-3 md:px-8 md:py-4 bg-gray-100 border-4 border-black text-black font-black text-2xl md:text-3xl rounded-xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-gray-200 active:translate-y-1 active:shadow-none transition-all"
                        >
                            처음으로 🔄
                        </button>
                    </footer>
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
