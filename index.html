<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>비트 온 지형! (Word on Beat)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <style>
        /* 기본 설정: 화면 잘림 방지 및 터치 최적화 */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Jua', sans-serif;
            background-color: #f0fdf4;
            /* 터치 시 확대 방지 및 드래그 방지 */
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* 비트를 타는 듯한 통통 튀는 애니메이션 */
        @keyframes beatPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }
        .animate-beat {
            animation: beatPulse 0.5s infinite ease-in-out;
        }
        
        /* 버튼 등장 애니메이션 */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }
        .pop-in {
            animation: popIn 0.3s ease-out forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // 1. 24개의 충분한 문제 데이터 배열 (하드코딩)
        const WORD_DATA = [
            { id: 1, word: '🏔️ 지리산', category: '산지' },
            { id: 2, word: '⛰️ 태백산맥', category: '산지' },
            { id: 3, word: '🗻 한라산', category: '산지' },
            { id: 4, word: '🧗 북한산', category: '산지' },
            { id: 5, word: '고개와 계곡', category: '산지' },
            { id: 6, word: '울창한 숲', category: '산지' },
            
            { id: 7, word: '💧 한강', category: '하천' },
            { id: 8, word: '🌊 낙동강', category: '하천' },
            { id: 9, word: '🛶 금강', category: '하천' },
            { id: 10, word: '물줄기', category: '하천' },
            { id: 11, word: '맑은 냇물', category: '하천' },
            { id: 12, word: '영산강', category: '하천' },
            
            { id: 13, word: '🌾 호남평야', category: '평야' },
            { id: 14, word: '🚜 나주평야', category: '평야' },
            { id: 15, word: '넓은 들판', category: '평야' },
            { id: 16, word: '논과 밭', category: '평야' },
            { id: 17, word: '김포평야', category: '평야' },
            { id: 18, word: '풍년 곡창지대', category: '평야' },
            
            { id: 19, word: '🦀 갯벌', category: '해안' },
            { id: 20, word: '🏖️ 모래사장', category: '해안' },
            { id: 21, word: '🌊 리아스식', category: '해안' },
            { id: 22, word: '아름다운 섬', category: '해안' },
            { id: 23, word: '깎아지른 절벽', category: '해안' },
            { id: 24, word: '항구와 배', category: '해안' }
        ];

        const CATEGORIES = ['산지', '하천', '평야', '해안'];
        const GAME_TIME = 60; // 게임 시간 60초

        function App() {
            const [gameState, setGameState] = useState('ready'); // ready, playing, end
            const [score, setScore] = useState(0);
            const [timeLeft, setTimeLeft] = useState(GAME_TIME);
            const [targetCategory, setTargetCategory] = useState('');
            const [currentOptions, setCurrentOptions] = useState([]);

            // 보기(정답 1 + 오답 3) 생성 함수
            const generateQuestion = useCallback(() => {
                // 1. 무작위 타겟 카테고리 선정
                const target = CATEGORIES[Math.floor(Math.random() * CATEGORIES.length)];
                setTargetCategory(target);

                // 2. 정답 1개 뽑기
                const correctWords = WORD_DATA.filter(w => w.category === target);
                const correctWord = correctWords[Math.floor(Math.random() * correctWords.length)];

                // 3. 오답 3개 뽑기 (타겟이 아닌 카테고리에서)
                const wrongWords = WORD_DATA.filter(w => w.category !== target);
                const shuffledWrongs = [...wrongWords].sort(() => 0.5 - Math.random());
                const selectedWrongs = shuffledWrongs.slice(0, 3);

                // 4. 보기 섞기 및 위치(화면 퍼센트) 무작위 배정
                const options = [correctWord, ...selectedWrongs].sort(() => 0.5 - Math.random());
                
                // 전자칠판에서 잘리지 않도록 안전 여백을 둔 무작위 좌표 생성 (Top: 20~70%, Left: 10~70%)
                const positionedOptions = options.map(opt => ({
                    ...opt,
                    top: Math.floor(Math.random() * 50) + 20 + '%',
                    left: Math.floor(Math.random() * 60) + 10 + '%'
                }));

                setCurrentOptions(positionedOptions);
            }, []);

            // 게임 시작
            const startGame = () => {
                setScore(0);
                setTimeLeft(GAME_TIME);
                setGameState('playing');
                generateQuestion();
            };

            // 정답 클릭 처리
            const handleWordClick = (wordCategory) => {
                if (wordCategory === targetCategory) {
                    setScore(prev => prev + 10);
                    generateQuestion(); // 정답 시 바로 다음 문제로
                } else {
                    // 오답 시 시간 3초 감소 페널티
                    setTimeLeft(prev => Math.max(0, prev - 3));
                }
            };

            // 타이머 로직
            useEffect(() => {
                let timer;
                if (gameState === 'playing' && timeLeft > 0) {
                    timer = setInterval(() => {
                        setTimeLeft(prev => prev - 1);
                    }, 1000);
                } else if (timeLeft === 0 && gameState === 'playing') {
                    setGameState('end');
                }
                return () => clearInterval(timer);
            }, [gameState, timeLeft]);

            return (
                <div className="w-full h-full relative overflow-hidden bg-gradient-to-br from-green-100 via-blue-100 to-purple-100 flex flex-col items-center justify-center">
                    
                    {/* 대기 화면 */}
                    {gameState === 'ready' && (
                        <div className="text-center z-10 p-8 bg-white/80 rounded-3xl shadow-2xl pop-in">
                            <h1 className="text-7xl font-bold text-blue-600 mb-6 drop-shadow-md">🎵 비트 온 지형! 🎵</h1>
                            <p className="text-3xl text-gray-700 mb-8">리듬에 맞춰 알맞은 지형 단어를 터치하세요!</p>
                            <button 
                                onClick={startGame}
                                className="px-12 py-6 bg-gradient-to-r from-pink-500 to-orange-400 text-white text-4xl rounded-full shadow-lg hover:scale-105 active:scale-95 transition-transform"
                            >
                                게임 시작
                            </button>
                        </div>
                    )}

                    {/* 게임 플레이 화면 */}
                    {gameState === 'playing' && (
                        <>
                            {/* 상단 UI (점수, 타겟, 남은 시간) */}
                            <div className="absolute top-0 w-full p-6 flex justify-between items-center bg-white/90 shadow-md z-20">
                                <div className="text-4xl text-blue-700">점수: <span className="text-5xl font-bold text-pink-500">{score}</span></div>
                                <div className="text-5xl font-bold text-gray-800 animate-pulse">
                                    <span className="text-blue-600">[{targetCategory}]</span> 찾기!
                                </div>
                                <div className={`text-4xl ${timeLeft <= 10 ? 'text-red-600 animate-bounce' : 'text-gray-700'}`}>
                                    시간: <span className="text-5xl font-bold">{timeLeft}</span>초
                                </div>
                            </div>

                            {/* 떠다니는 단어 버튼들 (리듬감 애니메이션 추가) */}
                            <div className="w-full h-full relative mt-20">
                                {currentOptions.map((opt, index) => (
                                    <button
                                        key={index}
                                        onClick={() => handleWordClick(opt.category)}
                                        className="absolute text-3xl md:text-5xl font-bold py-6 px-10 rounded-full shadow-xl bg-white border-4 border-indigo-400 text-indigo-800 animate-beat pop-in hover:bg-indigo-50 active:bg-indigo-200 transition-colors"
                                        style={{ top: opt.top, left: opt.left, animationDelay: `${index * 0.1}s` }}
                                    >
                                        {opt.word}
                                    </button>
                                ))}
                            </div>
                        </>
                    )}

                    {/* 게임 종료 화면 */}
                    {gameState === 'end' && (
                        <div className="text-center z-10 p-12 bg-white/95 rounded-3xl shadow-2xl pop-in">
                            <h2 className="text-6xl font-bold text-red-500 mb-6">⏰ 타임 오버!</h2>
                            <p className="text-4xl text-gray-700 mb-8">최종 점수: <span className="text-5xl font-bold text-blue-600">{score}</span>점</p>
                            <button 
                                onClick={startGame}
                                className="px-10 py-5 bg-blue-500 text-white text-3xl rounded-full shadow-lg hover:scale-105 active:scale-95 transition-transform"
                            >
                                다시 도전하기
                            </button>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
