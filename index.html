<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>비트 온 지형! (Word on Beat)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <style>
        /* 화면 잘림 방지 및 터치 최적화 */
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Jua', sans-serif;
            background-color: #f1f5f9;
            /* 종이 질감 배경 효과 */
            background-image: radial-gradient(#cbd5e1 1px, transparent 0);
            background-size: 40px 40px;
            /* 터치 간섭 완벽 차단 */
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }

        /* 텍스트 등장 애니메이션 */
        @keyframes popText {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        .animate-pop {
            animation: popText 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // 지형 데이터 (그림 대신 이모지와 배경색으로 구분하여 즉시 실행 가능하도록 구성)
        const TERRAIN_TYPES = {
            '산지': { icon: '⛰️', color: 'bg-green-100' },
            '하천': { icon: '🏞️', color: 'bg-blue-100' },
            '평야': { icon: '🌾', color: 'bg-yellow-100' },
            '해안': { icon: '🏖️', color: 'bg-cyan-100' }
        };

        // 5단계 데이터 생성 (각 단계별 8칸 - 4x2 배열)
        const STAGES_DATA = [
            ['하천', '하천', '하천', '하천', '산지', '하천', '산지', '하천'], // 1단계
            ['평야', '산지', '평야', '평야', '하천', '평야', '산지', '평야'], // 2단계
            ['해안', '해안', '산지', '해안', '해안', '하천', '해안', '해안'], // 3단계
            ['산지', '산지', '하천', '평야', '산지', '산지', '해안', '산지'], // 4단계
            ['하천', '평야', '해안', '산지', '평야', '하천', '산지', '해안']  // 5단계 (랜덤 심화)
        ];

        function App() {
            const [gameState, setGameState] = useState('ready'); // ready, playing
            const [currentStage, setCurrentStage] = useState(0);
            const [revealedCards, setRevealedCards] = useState(Array(8).fill(false));
            const [isPlayingBgm, setIsPlayingBgm] = useState(false);
            
            const audioRef = useRef(null);
            const fileInputRef = useRef(null);

            // BGM 파일 업로드 처리
            const handleAudioUpload = (event) => {
                const file = event.target.files[0];
                if (file) {
                    const audioUrl = URL.createObjectURL(file);
                    audioRef.current.src = audioUrl;
                }
            };

            // 게임 시작 및 BGM 재생
            const startGame = () => {
                setGameState('playing');
                setCurrentStage(0);
                setRevealedCards(Array(8).fill(false));
                
                if (audioRef.current) {
                    audioRef.current.play().catch(e => console.log("오디오 자동재생 제한됨", e));
                    setIsPlayingBgm(true);
                }
            };

            // 카드 터치 시 글자 보이기/숨기기 토글
            const toggleCard = (index) => {
                const newRevealed = [...revealedCards];
                newRevealed[index] = !newRevealed[index];
                setRevealedCards(newRevealed);
            };

            // 다음 단계로 이동
            const nextStage = () => {
                if (currentStage < 4) {
                    setCurrentStage(prev => prev + 1);
                    setRevealedCards(Array(8).fill(false)); // 카드 초기화
                }
            };

            // 이전 단계로 이동
            const prevStage = () => {
                if (currentStage > 0) {
                    setCurrentStage(prev => prev - 1);
                    setRevealedCards(Array(8).fill(false));
                }
            };

            // BGM 재생/일시정지 제어
            const toggleBgm = () => {
                if (audioRef.current.paused) {
                    audioRef.current.play();
                    setIsPlayingBgm(true);
                } else {
                    audioRef.current.pause();
                    setIsPlayingBgm(false);
                }
            };

            return (
                <div className="w-full h-full flex flex-col items-center justify-center relative">
                    
                    {/* 숨겨진 오디오 태그 (기본 무료 비트 제공, 파일 업로드 시 교체됨) */}
                    <audio 
                        ref={audioRef} 
                        loop 
                        src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" 
                        preload="auto"
                    />

                    {/* --- 대기 화면 --- */}
                    {gameState === 'ready' && (
                        <div className="flex flex-col items-center bg-white/90 p-10 rounded-3xl shadow-2xl z-10 border-4 border-black">
                            <h1 className="text-7xl font-black mb-8 text-black drop-shadow-md tracking-widest">
                                🎵 단어 리듬 게임 🎵
                            </h1>
                            
                            <div className="mb-8 p-6 bg-gray-100 rounded-xl border-2 border-dashed border-gray-400 text-center">
                                <p className="text-2xl text-gray-700 mb-4">🎶 원하시는 인스타 릴스 음악(MP3)이 있다면 넣어주세요!</p>
                                <p className="text-xl text-gray-500 mb-4">(선택 안 하시면 기본 비트가 재생됩니다)</p>
                                <input 
                                    type="file" 
                                    accept="audio/*" 
                                    onChange={handleAudioUpload}
                                    ref={fileInputRef}
                                    className="block w-full text-xl text-slate-500 file:mr-4 file:py-3 file:px-6 file:rounded-full file:border-0 file:text-xl file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer"
                                />
                            </div>

                            <button 
                                onClick={startGame}
                                className="px-16 py-6 bg-yellow-400 border-4 border-black text-black font-black text-5xl rounded-2xl shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] hover:translate-y-1 hover:shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] active:translate-y-2 active:shadow-none transition-all"
                            >
                                게임 시작!
                            </button>
                        </div>
                    )}

                    {/* --- 게임 화면 --- */}
                    {gameState === 'playing' && (
                        <div className="w-full h-full flex flex-col items-center justify-between p-4">
                            
                            {/* 상단 UI (메가폰, 단계 표시, 번개) */}
                            <div className="w-full flex justify-between items-center px-10 pt-4 h-[15%]">
                                <div className="text-7xl drop-shadow-lg">📢</div>
                                <div className="text-8xl font-black tracking-widest text-black drop-shadow-md flex items-center gap-4">
                                    <button onClick={prevStage} className={`text-6xl text-gray-400 hover:text-black transition-colors ${currentStage === 0 ? 'invisible' : ''}`}>◀</button>
                                    <span>{currentStage + 1} / 5</span>
                                    <button onClick={nextStage} className={`text-6xl text-gray-400 hover:text-black transition-colors ${currentStage === 4 ? 'invisible' : ''}`}>▶</button>
                                </div>
                                <div className="flex flex-col items-center">
                                    <div className="text-7xl drop-shadow-lg mb-2">⚡</div>
                                    <button 
                                        onClick={toggleBgm}
                                        className="px-4 py-2 bg-black text-white rounded-full text-xl font-bold shadow-md active:scale-95"
                                    >
                                        {isPlayingBgm ? '음악 끄기 ⏸️' : '음악 켜기 ▶️'}
                                    </button>
                                </div>
                            </div>

                            {/* 4x2 격자 배열 (선생님 사진과 동일한 비율 및 테두리 두께) */}
                            <div className="w-[95%] max-w-7xl h-[80%] grid grid-cols-4 grid-rows-2 gap-4 pb-6">
                                {STAGES_DATA[currentStage].map((terrain, index) => (
                                    <div 
                                        key={index}
                                        onClick={() => toggleCard(index)}
                                        className={`
                                            relative w-full h-full border-8 cursor-pointer flex items-center justify-center overflow-hidden
                                            transition-all duration-200 shadow-[6px_6px_0px_0px_rgba(0,0,0,0.3)]
                                            ${TERRAIN_TYPES[terrain].color}
                                            ${revealedCards[index] ? 'border-green-500 scale-[0.98]' : 'border-black'}
                                        `}
                                    >
                                        {/* 배경 아이콘 (지형을 뜻하는 이모지를 배경 그림처럼 크게 배치) */}
                                        <span className="text-[12rem] opacity-40 select-none">
                                            {TERRAIN_TYPES[terrain].icon}
                                        </span>

                                        {/* 터치 시 나타나는 굵은 글씨 ("하천", "산지" 등) */}
                                        {revealedCards[index] && (
                                            <div className="absolute inset-0 flex items-center justify-center bg-black/20 backdrop-blur-sm">
                                                <span className="text-[7rem] font-black text-white text-stroke animate-pop tracking-widest drop-shadow-[0_5px_5px_rgba(0,0,0,0.8)]"
                                                      style={{ WebkitTextStroke: '4px black' }}>
                                                    {terrain}
                                                </span>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>

                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
