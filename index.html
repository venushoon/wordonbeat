<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>단어 리듬 게임 (지형편)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Jua', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1px, transparent 0);
            background-size: 40px 40px;
            /* 제시형이므로 터치/드래그 완전 차단 */
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 하이라이트 통통 튀는 애니메이션 */
        @keyframes beatBounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.08); }
            100% { transform: scale(1.03); }
        }
        .highlight-beat {
            animation: beatBounce 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            border-color: #ef4444 !important; /* Tailwind red-500 */
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.8) !important;
            z-index: 20;
            opacity: 1 !important;
        }

        .responsive-emoji {
            font-size: min(12vw, 15vh);
            line-height: 1;
        }
        .responsive-text {
            font-size: min(5vw, 6vh);
            line-height: 1.2;
            margin-top: 0.5rem;
        }
        .text-only-mode {
            font-size: min(8vw, 10vh);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TERRAIN_TYPES = {
            '산지': { icon: '⛰️', color: 'bg-green-100' },
            '하천': { icon: '🏞️', color: 'bg-blue-100' },
            '평야': { icon: '🌾', color: 'bg-yellow-100' },
            '해안': { icon: '🏖️', color: 'bg-cyan-100' }
        };

        const STAGES_DATA = [
            ['하천', '하천', '하천', '하천', '산지', '하천', '산지', '하천'], // 1단계
            ['평야', '산지', '평야', '평야', '하천', '평야', '산지', '평야'], // 2단계
            ['해안', '해안', '산지', '해안', '해안', '하천', '해안', '해안'], // 3단계
            ['산지', '산지', '하천', '평야', '산지', '산지', '해안', '산지'], // 4단계
            ['하천', '평야', '해안', '산지', '평야', '하천', '산지', '해안']  // 5단계
        ];

        // ⏱️ 음원에 맞춘 정밀 템포 세팅
        const INTRO_DURATION = 2700; // 인트로 대기 시간
        const STAGE_DURATION = 5450; // 1단계당 할당 시간 (5.45초)

        function App() {
            const [gameState, setGameState] = useState('ready'); // ready, intro, playing, end
            const [currentStage, setCurrentStage] = useState(0);
            const [showVideo, setShowVideo] = useState(false);
            const [cardDisplayMode, setCardDisplayMode] = useState('image-and-text'); // image-only, image-and-text, text-only
            
            // 🔥 자동 하이라이트를 위한 인덱스 상태 (0~7)
            const [highlightIndex, setHighlightIndex] = useState(-1);
            const [timerKey, setTimerKey] = useState(0); 
            
            const ytRef = useRef(null);

            const sendYTCmd = (cmd, args = []) => {
                if (ytRef.current && ytRef.current.contentWindow) {
                    ytRef.current.contentWindow.postMessage(
                        JSON.stringify({ event: 'command', func: cmd, args: args }), '*'
                    );
                }
            };

            const startGame = () => {
                setGameState('intro');
                setCurrentStage(0);
                setHighlightIndex(-1);
                
                sendYTCmd('seekTo', [0, true]);
                sendYTCmd('playVideo');

                setTimeout(() => {
                    setGameState('playing');
                    setTimerKey(prev => prev + 1); 
                }, INTRO_DURATION);
            };

            const restartGame = () => {
                setGameState('ready'); 
                sendYTCmd('pauseVideo'); 
            };

            const nextStage = () => {
                setCurrentStage(prev => {
                    const next = prev + 1;
                    if (next < 5) {
                        setTimerKey(k => k + 1); 
                        setHighlightIndex(0); // 새 단계마다 하이라이트 첫 칸으로 리셋
                        return next;
                    } else {
                        setGameState('end'); 
                        sendYTCmd('pauseVideo');
                        return prev;
                    }
                });
            };

            // 🎵 노래방 하이라이트 및 단계 자동 넘김 로직
            useEffect(() => {
                let stageTimeout;
                let beatInterval;

                if (gameState === 'playing') {
                    // 1. 하이라이트를 0번 칸부터 시작
                    setHighlightIndex(0);

                    // 2. 5.45초(STAGE_DURATION)를 8등분하여 칸을 순서대로 이동 (약 681ms 마다 이동)
                    const timePerBeat = STAGE_DURATION / 8;
                    beatInterval = setInterval(() => {
                        setHighlightIndex(prev => (prev < 7 ? prev + 1 : 7));
                    }, timePerBeat);

                    // 3. 5.45초 뒤 다음 단계로 이동
                    stageTimeout = setTimeout(() => {
                        nextStage();
                    }, STAGE_DURATION);
                }

                return () => {
                    clearTimeout(stageTimeout);
                    clearInterval(beatInterval);
                };
            }, [gameState, currentStage]); 

            return (
                <div className="w-screen h-screen flex flex-col relative overflow-hidden text-gray-800">
                    
                    {/* 유튜브 Iframe */}
                    <iframe 
                        ref={ytRef}
                        className={`absolute bottom-[14vh] right-6 rounded-2xl shadow-2xl border-4 border-black transition-all duration-300 ${showVideo ? 'opacity-100 z-50 translate-y-0' : 'opacity-0 -z-10 translate-y-10 pointer-events-none'}`}
                        width="384" 
                        height="216" 
                        src="https://www.youtube.com/embed/_RiQjsu1KIw?enablejsapi=1&controls=0&rel=0&playsinline=1" 
                        frameBorder="0"
                        allow="autoplay; encrypted-media"
                    ></iframe>

                    {/* --- 대기/인트로/성공 화면 오버레이 --- */}
                    {gameState !== 'playing' && (
                        <div className={`absolute inset-0 z-50 flex flex-col items-center justify-center p-12 transition-colors duration-300 ${gameState === 'intro' ? 'bg-yellow-300' : 'bg-white/95'}`}>
                            
                            {gameState === 'ready' && (
                                <>
                                    <h1 className="text-7xl md:text-8xl font-black mb-12 text-black drop-shadow-md tracking-widest text-center">
                                        🎵 단어 리듬 게임 🎵
                                    </h1>
                                    <div className="mb-12 p-8 bg-gray-100 rounded-3xl border-4 border-black text-center shadow-[6px_6px_0px_0px_rgba(0,0,0,1)]">
                                        <p className="text-3xl md:text-4xl text-black font-bold mb-8">화면 제시 방식 선택</p>
                                        <div className="flex flex-wrap gap-4 justify-center">
                                            <button 
                                                onClick={() => setCardDisplayMode('image-only')}
                                                className={`px-6 py-4 text-2xl font-black rounded-xl border-4 border-black transition-all ${cardDisplayMode === 'image-only' ? 'bg-yellow-400 shadow-none translate-y-1' : 'bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-yellow-50'}`}
                                            >
                                                🖼️ 그림만
                                            </button>
                                            <button 
                                                onClick={() => setCardDisplayMode('image-and-text')}
                                                className={`px-6 py-4 text-2xl font-black rounded-xl border-4 border-black transition-all ${cardDisplayMode === 'image-and-text' ? 'bg-yellow-400 shadow-none translate-y-1' : 'bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-yellow-50'}`}
                                            >
                                                🖼️✍️ 그림+단어
                                            </button>
                                            <button 
                                                onClick={() => setCardDisplayMode('text-only')}
                                                className={`px-6 py-4 text-2xl font-black rounded-xl border-4 border-black transition-all ${cardDisplayMode === 'text-only' ? 'bg-yellow-400 shadow-none translate-y-1' : 'bg-white shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-yellow-50'}`}
                                            >
                                                ✍️ 단어만
                                            </button>
                                        </div>
                                    </div>
                                    <button 
                                        onClick={startGame}
                                        className="px-16 py-6 bg-green-500 border-4 border-black text-black font-black text-5xl md:text-6xl rounded-2xl shadow-[8px_8px_0px_0px_rgba(0,0,0,1)] hover:-translate-y-1 hover:shadow-[10px_10px_0px_0px_rgba(0,0,0,1)] active:translate-y-2 active:shadow-none transition-all"
                                    >
                                        시작하기!
                                    </button>
                                </>
                            )}

                            {gameState === 'intro' && (
                                <div className="text-center animate-bounce">
                                    <div className="text-[8rem] mb-4">🎤</div>
                                    <h2 className="text-7xl md:text-9xl font-black text-black tracking-widest drop-shadow-lg">
                                        원! 투! 쓰리! 고!
                                    </h2>
                                </div>
                            )}

                            {gameState === 'end' && (
                                <>
                                    <div className="text-[10rem] mb-4">🎉</div>
                                    <h2 className="text-8xl font-black mb-10 text-green-600 drop-shadow-md tracking-widest">완주 성공!</h2>
                                    <button onClick={restartGame} className="px-12 py-5 bg-white border-4 border-black text-4xl font-black rounded-2xl shadow-[6px_6px_0px_0px_rgba(0,0,0,1)] active:shadow-none active:translate-y-2 transition-all">다시 하기</button>
                                </>
                            )}
                        </div>
                    )}

                    {/* --- 상단 헤더 영역 --- */}
                    <header className="h-[12vh] shrink-0 flex justify-between items-center px-6 md:px-10 border-b-4 border-gray-300 bg-white shadow-sm z-10">
                        <div className="text-5xl md:text-6xl drop-shadow-md">📢</div>
                        
                        <div className="flex-1 max-w-2xl mx-8 flex flex-col items-center gap-2">
                            <span className="text-5xl md:text-6xl font-black tracking-widest text-black">
                                {currentStage + 1} / 5 단계
                            </span>
                            <div className="w-full h-4 md:h-6 bg-gray-200 rounded-full border-2 border-gray-400 overflow-hidden">
                                <div 
                                    key={timerKey} 
                                    className="h-full bg-blue-500 rounded-full"
                                    style={{
                                        width: '0%',
                                        animation: gameState === 'playing' ? `shrink ${STAGE_DURATION}ms linear forwards` : 'none'
                                    }}
                                ></div>
                            </div>
                            <style>
                                {`@keyframes shrink { from { width: 100%; } to { width: 0%; } }`}
                            </style>
                        </div>

                        <div className="flex items-center">
                            <button onClick={() => setShowVideo(!showVideo)} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-lg md:text-xl font-bold active:scale-95 transition-transform shadow-md">
                                {showVideo ? '영상 끄기 🙈' : '영상 보기 📺'}
                            </button>
                        </div>
                    </header>

                    {/* --- 메인 카드 영역 (터치 불가, 자동 하이라이트 표시) --- */}
                    <main className="flex-1 min-h-0 w-full flex items-center justify-center p-4 bg-slate-100/50">
                        <div className="w-full h-full max-w-7xl max-h-[80vh] grid grid-cols-4 grid-rows-2 gap-3 md:gap-5">
                            {STAGES_DATA[currentStage].map((terrain, index) => {
                                // 현재 인덱스가 하이라이트 인덱스인지 확인
                                const isHighlighted = index === highlightIndex;

                                return (
                                    <div 
                                        key={index}
                                        className={`
                                            relative w-full h-full rounded-xl border-[6px] md:border-8 overflow-hidden
                                            transition-all duration-75 shadow-sm
                                            ${TERRAIN_TYPES[terrain].color}
                                            ${isHighlighted ? 'highlight-beat' : 'border-gray-800 opacity-60'}
                                        `}
                                    >
                                        <div className="absolute inset-0 flex flex-col items-center justify-center p-2">
                                            
                                            {/* 그림 렌더링 (단어만 모드가 아닐 때) */}
                                            {cardDisplayMode !== 'text-only' && (
                                                <span className="responsive-emoji drop-shadow-md">
                                                    {TERRAIN_TYPES[terrain].icon}
                                                </span>
                                            )}
                                            
                                            {/* 텍스트 렌더링 (그림만 모드가 아닐 때) */}
                                            {cardDisplayMode !== 'image-only' && (
                                                <span className={`font-black text-white tracking-widest drop-shadow-[0_4px_4px_rgba(0,0,0,0.8)] text-center ${cardDisplayMode === 'text-only' ? 'text-only-mode' : 'responsive-text'}`}
                                                      style={{ WebkitTextStroke: '2px black' }}>
                                                    {terrain}
                                                </span>
                                            )}

                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {/* --- 하단 컨트롤 바 영역 --- */}
                    <footer className="h-[12vh] shrink-0 bg-white border-t-4 border-gray-300 flex justify-between items-center px-6 md:px-12 z-10 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)]">
                        <div className="text-3xl md:text-4xl font-black text-red-500 tracking-wider flex-1 text-center animate-pulse">
                            🎤 비트에 맞춰 붉은 칸을 큰 소리로 읽어보세요!
                        </div>
                        <button 
                            onClick={restartGame}
                            className="px-6 py-3 md:px-8 md:py-4 bg-gray-100 border-4 border-black text-black font-black text-2xl md:text-3xl rounded-xl shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-gray-200 active:translate-y-1 active:shadow-none transition-all"
                        >
                            처음으로 🔄
                        </button>
                    </footer>
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
