<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>단어 리듬 게임 (지형편)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Jua', sans-serif;
            background-color: #f1f5f9;
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* 레퍼런스 사이트처럼 날카롭고 절도 있는 하이라이트 타격감 */
        @keyframes beatSnap {
            0% { transform: scale(1.1); border-color: #ef4444; box-shadow: 0 0 30px rgba(239, 68, 68, 0.8); }
            100% { transform: scale(1.0); border-color: #ef4444; box-shadow: 0 0 10px rgba(239, 68, 68, 0.3); }
        }
        .highlight-beat {
            animation: beatSnap 0.25s cubic-bezier(0.1, 0.9, 0.2, 1) forwards !important;
            border-color: #ef4444 !important; /* 선명한 빨간색 테두리 */
            z-index: 20;
        }

        /* 글자 팝 애니메이션 */
        .content-active {
            transform: scale(1.08);
            transition: transform 0.1s ease-out;
            color: #b91c1c; /* 하이라이트 시 글자색도 붉게 강조 */
        }

        /* 화면 크기에 반응하는 글자/그림 크기 */
        .responsive-emoji {
            font-size: min(10vw, 13vh);
            line-height: 1;
        }
        .responsive-text {
            font-size: min(5vw, 6vh);
            line-height: 1.2;
            margin-top: 0.5rem;
            color: #1e293b;
        }
        .text-only-mode {
            font-size: min(7vw, 9vh);
            color: #1e293b;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const TERRAIN_TYPES = {
            '산지': { icon: '⛰️', color: 'bg-green-50' },
            '하천': { icon: '🏞️', color: 'bg-blue-50' },
            '평야': { icon: '🌾', color: 'bg-yellow-50' },
            '해안': { icon: '🏖️', color: 'bg-cyan-50' }
        };

        const STAGES_DATA = [
            ['하천', '하천', '하천', '하천', '산지', '하천', '산지', '하천'], // 1단계
            ['평야', '산지', '평야', '평야', '하천', '평야', '산지', '평야'], // 2단계
            ['해안', '해안', '산지', '해안', '해안', '하천', '해안', '해안'], // 3단계
            ['산지', '산지', '하천', '평야', '산지', '산지', '해안', '산지'], // 4단계
            ['하천', '평야', '해안', '산지', '평야', '하천', '산지', '해안']  // 5단계
        ];

        function App() {
            // 상태: ready(대기) -> playing(게임화면 진입: 준비 및 진행 모두 포함) -> end(종료)
            const [gameState, setGameState] = useState('ready'); 
            const [currentStage, setCurrentStage] = useState(0);
            const [cardDisplayMode, setCardDisplayMode] = useState('image-and-text'); 
            const [showVideo, setShowVideo] = useState(false);
            
            // 오디오 싱크 핵심 세팅 (수정된 완벽 타이밍)
            const [prepBeatsStartTime, setPrepBeatsStartTime] = useState(2.75); // 준비 8비트 시작 시간
            const [gameLoopStartTime, setGameLoopStartTime] = useState(5.45);   // 실제 하이라이트 시작 시간
            const [beatDuration, setBeatDuration] = useState(0.34);             // 1비트당 시간 (속도)
            
            // UI를 위한 상태 (준비 구간인지 실제 하이라이트 구간인지 식별)
            const [isPrepPhase, setIsPrepPhase] = useState(false); 
            const [highlightIndex, setHighlightIndex] = useState(-1);
            
            const ytPlayerRef = useRef(null);

            // 유튜브 API 세팅
            useEffect(() => {
                const loadYoutubeAPI = () => {
                    if (!window.YT) {
                        const tag = document.createElement('script');
                        tag.src = "https://www.youtube.com/iframe_api";
                        const firstScriptTag = document.getElementsByTagName('script')[0];
                        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
                    }
                    
                    window.onYouTubeIframeAPIReady = () => {
                        ytPlayerRef.current = new window.YT.Player('yt-player-container', {
                            videoId: '_RiQjsu1KIw',
                            playerVars: { 'controls': 0, 'disablekb': 1, 'rel': 0, 'playsinline': 1 },
                            events: { 'onReady': () => console.log('Youtube Player Ready') }
                        });
                    };
                };
                loadYoutubeAPI();
            }, []);

            // 🎵 메인 리듬 추적 엔진
            useEffect(() => {
                let animationFrameId;

                const trackTime = () => {
                    if (gameState === 'playing' && ytPlayerRef.current && typeof ytPlayerRef.current.getCurrentTime === 'function') {
                        const currentTime = ytPlayerRef.current.getCurrentTime();

                        // 1. 실제 본 게임 진행 구간 (하이라이트 이동)
                        if (currentTime >= gameLoopStartTime) {
                            setIsPrepPhase(false);
                            
                            const playTime = currentTime - gameLoopStartTime;
                            const totalBeatsElapsed = Math.floor(playTime / beatDuration);
                            
                            // 5단계(80비트) 종료 처리
                            if (totalBeatsElapsed >= 80) {
                                setGameState('end');
                                ytPlayerRef.current.pauseVideo();
                                return;
                            }

                            // 단계 및 하이라이트 인덱스 계산 (1단계 = 16비트)
                            const newStage = Math.floor(totalBeatsElapsed / 16);
                            if (newStage !== currentStage) {
                                setCurrentStage(newStage);
                            }

                            const targetIndex = totalBeatsElapsed % 8;
                            setHighlightIndex(prev => prev !== targetIndex ? targetIndex : prev);
                        } 
                        // 2. 준비 비트 구간 ("삑삑삑삑" - 카드는 보이지만 하이라이트는 없는 상태)
                        else if (currentTime >= prepBeatsStartTime && currentTime < gameLoopStartTime) {
                            setIsPrepPhase(true);
                            setHighlightIndex(-1); // 하이라이트 끄기
                        }
                        // 3. 극초기 인트로 구간
                        else {
                            setIsPrepPhase(false);
                            setHighlightIndex(-1);
                        }
                    }
                    
                    if (gameState === 'playing') {
                        animationFrameId = requestAnimationFrame(trackTime);
                    }
                };

                if (gameState === 'playing') {
                    animationFrameId = requestAnimationFrame(trackTime);
                }

                return () => cancelAnimationFrame(animationFrameId);
            }, [gameState, gameLoopStartTime, beatDuration, currentStage]);

            const startGame = () => {
                if (ytPlayerRef.current && typeof ytPlayerRef.current.seekTo === 'function') {
                    setGameState('playing');
                    setCurrentStage(0);
                    setHighlightIndex(-1);
                    setIsPrepPhase(false);
                    ytPlayerRef.current.seekTo(0, true);
                    ytPlayerRef.current.playVideo();
                } else {
                    alert('유튜브 오디오를 로딩 중입니다. 1~2초 후 다시 눌러주세요!');
                }
            };

            const restartGame = () => {
                setGameState('ready'); 
                if (ytPlayerRef.current) {
                    ytPlayerRef.current.pauseVideo();
                    ytPlayerRef.current.seekTo(0, true);
                }
            };

            return (
                <div className="w-screen h-screen flex flex-col relative overflow-hidden bg-white text-gray-900">
                    
                    {/* 숨겨진 유튜브 플레이어 */}
                    <div 
                        className={`absolute bottom-[10vh] right-6 rounded-2xl shadow-xl border-4 border-black transition-opacity duration-300 overflow-hidden ${showVideo ? 'opacity-100 z-50' : 'opacity-0 -z-10 pointer-events-none'}`}
                        style={{ width: '320px', height: '180px' }}
                    >
                        <div id="yt-player-container" className="w-full h-full"></div>
                    </div>

                    {/* --- 대기(시작 전) 및 종료 화면 --- */}
                    {(gameState === 'ready' || gameState === 'end') && (
                        <div className="absolute inset-0 z-50 flex flex-col items-center justify-center p-8 bg-slate-50">
                            
                            {gameState === 'ready' && (
                                <div className="w-full max-w-4xl flex flex-col items-center animate-fade-in">
                                    <h1 className="text-6xl md:text-8xl font-black mb-10 text-gray-900 tracking-tight text-center drop-shadow-sm">
                                        단어 리듬 게임
                                    </h1>
                                    
                                    {/* 화면 제시 방식 선택 (깔끔한 UI) */}
                                    <div className="w-full bg-white p-8 rounded-3xl shadow-lg border-2 border-slate-200 mb-10 flex flex-col items-center">
                                        <p className="text-2xl font-bold mb-6 text-slate-700">모드를 선택하세요</p>
                                        <div className="flex flex-wrap gap-4 justify-center">
                                            <button onClick={() => setCardDisplayMode('image-only')} className={`px-8 py-4 text-2xl font-bold rounded-2xl transition-all ${cardDisplayMode === 'image-only' ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>🖼️ 그림만</button>
                                            <button onClick={() => setCardDisplayMode('image-and-text')} className={`px-8 py-4 text-2xl font-bold rounded-2xl transition-all ${cardDisplayMode === 'image-and-text' ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>🖼️ + ✍️ 그림과 단어</button>
                                            <button onClick={() => setCardDisplayMode('text-only')} className={`px-8 py-4 text-2xl font-bold rounded-2xl transition-all ${cardDisplayMode === 'text-only' ? 'bg-blue-600 text-white shadow-md' : 'bg-slate-100 text-slate-600 hover:bg-slate-200'}`}>✍️ 단어만</button>
                                        </div>
                                    </div>

                                    {/* 싱크 튜닝 (작고 눈에 덜 띄게 배치) */}
                                    <div className="w-full max-w-2xl bg-slate-100 p-4 rounded-2xl border border-slate-200 mb-10 flex flex-col items-center">
                                        <div className="text-lg font-bold text-slate-600 mb-4 flex items-center gap-2">
                                            ⚙️ 선생님 전용 싱크 조절
                                        </div>
                                        <div className="flex gap-10 w-full justify-center">
                                            <div className="flex flex-col items-center">
                                                <span className="text-sm font-bold text-slate-500 mb-2">시작 타이밍 (현재: {gameLoopStartTime}초)</span>
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => setGameLoopStartTime(prev => Math.max(0, parseFloat((prev - 0.01).toFixed(2))))} className="px-3 py-1 bg-white border border-slate-300 rounded font-bold hover:bg-slate-50">-</button>
                                                    <button onClick={() => setGameLoopStartTime(prev => parseFloat((prev + 0.01).toFixed(2)))} className="px-3 py-1 bg-white border border-slate-300 rounded font-bold hover:bg-slate-50">+</button>
                                                </div>
                                            </div>
                                            <div className="flex flex-col items-center border-l border-slate-300 pl-10">
                                                <span className="text-sm font-bold text-slate-500 mb-2">비트 속도 (현재: {beatDuration}초)</span>
                                                <div className="flex items-center gap-2">
                                                    <button onClick={() => setBeatDuration(prev => Math.max(0.1, parseFloat((prev - 0.005).toFixed(3))))} className="px-3 py-1 bg-white border border-slate-300 rounded font-bold hover:bg-slate-50">-</button>
                                                    <button onClick={() => setBeatDuration(prev => parseFloat((prev + 0.005).toFixed(3)))} className="px-3 py-1 bg-white border border-slate-300 rounded font-bold hover:bg-slate-50">+</button>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <button onClick={startGame} className="px-20 py-6 bg-gray-900 text-white font-black text-4xl rounded-full shadow-xl hover:scale-105 active:scale-95 transition-all">
                                        ▶ 플레이 시작
                                    </button>
                                </div>
                            )}

                            {gameState === 'end' && (
                                <div className="text-center animate-fade-in">
                                    <div className="text-[8rem] mb-4">🎉</div>
                                    <h2 className="text-7xl font-black mb-10 text-gray-900">완주를 축하합니다!</h2>
                                    <button onClick={restartGame} className="px-12 py-5 bg-blue-600 text-white text-3xl font-bold rounded-full shadow-lg hover:scale-105 transition-all">처음으로 돌아가기</button>
                                </div>
                            )}
                        </div>
                    )}

                    {/* --- 상단 헤더 --- */}
                    <header className="h-[12vh] shrink-0 flex justify-between items-center px-8 border-b-2 border-slate-200 bg-white z-10">
                        <div className="text-4xl md:text-5xl">📢</div>
                        
                        <div className="flex-1 flex flex-col items-center justify-center gap-1">
                            {/* 준비 상태일 때와 진행 중일 때 텍스트 분기 */}
                            {isPrepPhase ? (
                                <div className="text-2xl md:text-3xl font-black text-red-500 animate-pulse bg-red-50 px-6 py-2 rounded-full border border-red-200">
                                    👀 카드를 미리 읽어보며 리듬을 타세요!
                                </div>
                            ) : (
                                <div className="flex items-center gap-4">
                                    <span className="text-3xl md:text-4xl font-black text-slate-800 bg-slate-100 px-6 py-2 rounded-full">
                                        {currentStage + 1} / 5 단계
                                    </span>
                                </div>
                            )}
                        </div>

                        <div className="flex items-center">
                            <button onClick={() => setShowVideo(!showVideo)} className="px-4 py-2 bg-slate-800 text-white rounded-xl text-lg font-bold hover:bg-slate-700 transition-colors">
                                {showVideo ? '영상 끄기' : '영상 보기'}
                            </button>
                        </div>
                    </header>

                    {/* --- 메인 카드 영역 (방해물 완전 제거, 투명도 없음) --- */}
                    <main className="flex-1 min-h-0 w-full flex items-center justify-center p-4 md:p-8 bg-slate-100">
                        {/* 4x2 그리드 배열 */}
                        <div className="w-full h-full max-w-7xl grid grid-cols-4 grid-rows-2 gap-4 md:gap-6">
                            {STAGES_DATA[currentStage].map((terrain, index) => {
                                const isHighlighted = index === highlightIndex;

                                return (
                                    <div 
                                        key={index}
                                        className={`
                                            relative w-full h-full rounded-2xl border-[5px] overflow-hidden bg-white shadow-sm
                                            transition-all duration-[50ms]
                                            ${isHighlighted ? 'highlight-beat' : 'border-slate-300'}
                                        `}
                                    >
                                        <div className={`absolute inset-0 flex flex-col items-center justify-center p-2 ${isHighlighted ? 'content-active bg-red-50/30' : TERRAIN_TYPES[terrain].color}`}>
                                            
                                            {cardDisplayMode !== 'text-only' && (
                                                <span className="responsive-emoji drop-shadow-sm">
                                                    {TERRAIN_TYPES[terrain].icon}
                                                </span>
                                            )}
                                            
                                            {cardDisplayMode !== 'image-only' && (
                                                <span className={`font-black tracking-wide text-center ${cardDisplayMode === 'text-only' ? 'text-only-mode' : 'responsive-text'}`}>
                                                    {terrain}
                                                </span>
                                            )}

                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </main>

                    {/* --- 하단 푸터 --- */}
                    <footer className="h-[10vh] shrink-0 bg-white border-t-2 border-slate-200 flex justify-between items-center px-8 z-10">
                        <div className="text-2xl md:text-3xl font-black text-slate-600 flex-1 text-center">
                            붉은 칸에 맞춰 다 함께 큰 소리로 외쳐요!
                        </div>
                        <button onClick={restartGame} className="px-6 py-3 bg-slate-200 text-slate-700 font-bold text-xl rounded-xl hover:bg-slate-300 transition-colors">
                            종료 ⏹️
                        </button>
                    </footer>
                    
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
